services:
  db:
    image: pgvector/pgvector:pg16
    container_name: article_index-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-article_index}
      POSTGRES_USER: ${POSTGRES_USER:-article_index}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-article_index}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./indexes.sql:/docker-entrypoint-initdb.d/02-indexes.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7
    container_name: article_index-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: article_index-api
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://article_index:article_index@db:5432/article_index}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      API_KEY: ${API_KEY:-change-me-long-random}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-nomic-embed-text}
      RAG_CHAT_MODEL: ${RAG_CHAT_MODEL:-llama3.2}
      RAG_SIMILARITY_THRESHOLD: ${RAG_SIMILARITY_THRESHOLD:-0.7}
      RAG_CONTEXT_LIMIT: ${RAG_CONTEXT_LIMIT:-5}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: 8000
    ports:
      - "${API_PORT:-8001}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Uncomment for live dev:
    # volumes:
    #   - ./api:/app
    #   - ./shared:/app/shared

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: article_index-worker
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://article_index:article_index@db:5432/article_index}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      API_KEY: ${API_KEY:-change-me-long-random}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-nomic-embed-text}
      RAG_CHAT_MODEL: ${RAG_CHAT_MODEL:-llama3.2}
      RAG_SIMILARITY_THRESHOLD: ${RAG_SIMILARITY_THRESHOLD:-0.7}
      RAG_CONTEXT_LIMIT: ${RAG_CONTEXT_LIMIT:-5}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MAX_CONCURRENT_PROCESSING: ${MAX_CONCURRENT_PROCESSING:-3}
      CHUNK_SIZE: ${CHUNK_SIZE:-500}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-50}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Uncomment for live dev:
    volumes:
      - ./worker:/app
      - ./shared:/app/shared

volumes:
  pgdata: